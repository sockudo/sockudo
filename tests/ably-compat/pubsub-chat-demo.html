<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sockudo Ably Pub/Sub Chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        border-bottom: 1px solid #d9e0eb;
        background: #ffffff;
        padding: 18px 24px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      main {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        min-height: 0;
      }

      form,
      .panel {
        box-sizing: border-box;
      }

      .settings {
        border-right: 1px solid #d9e0eb;
        background: #fbfcff;
        padding: 18px;
        display: grid;
        align-content: start;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
        color: #44516a;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c7d0de;
        border-radius: 6px;
        padding: 10px 11px;
        font: inherit;
        background: #ffffff;
        color: #172033;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 700;
        color: #ffffff;
        background: #2563eb;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        border: 1px solid #c7d0de;
        border-radius: 6px;
        padding: 10px 11px;
        background: #ffffff;
        font-size: 13px;
        color: #44516a;
      }

      .chat {
        min-height: 0;
        display: grid;
        grid-template-rows: 1fr auto;
      }

      .messages {
        min-height: 0;
        overflow: auto;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        max-width: min(720px, 86%);
        border: 1px solid #d9e0eb;
        border-radius: 8px;
        background: #ffffff;
        padding: 10px 12px;
      }

      .message.self {
        align-self: flex-end;
        border-color: #9bb7ff;
        background: #eef4ff;
      }

      .meta {
        margin-bottom: 4px;
        font-size: 12px;
        font-weight: 700;
        color: #59667d;
      }

      .composer {
        border-top: 1px solid #d9e0eb;
        background: #ffffff;
        padding: 14px 18px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        .settings {
          border-right: 0;
          border-bottom: 1px solid #d9e0eb;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Sockudo Ably Pub/Sub Chat</h1>
    </header>
    <main>
      <form class="settings" id="settings">
        <label>
          Key
          <input id="key" value="app-key:app-secret" />
        </label>
        <label>
          Endpoint
          <input id="endpoint" value="127.0.0.1" />
        </label>
        <label>
          Port
          <input id="port" value="6001" inputmode="numeric" />
        </label>
        <label>
          Channel
          <input id="channel" value="chat:ably-browser-demo" />
        </label>
        <label>
          Client ID
          <input id="clientId" />
        </label>
        <button id="connect" type="submit">Connect</button>
        <div class="status" id="status">Disconnected</div>
      </form>

      <section class="chat">
        <div class="messages" id="messages"></div>
        <form class="composer" id="composer">
          <input id="text" placeholder="Type a message" autocomplete="off" />
          <button id="send" type="submit" disabled>Send</button>
        </form>
      </section>
    </main>

    <script src="/node_modules/ably/build/ably.min.js"></script>
    <script>
      const settings = document.getElementById("settings");
      const composer = document.getElementById("composer");
      const statusNode = document.getElementById("status");
      const messagesNode = document.getElementById("messages");
      const sendButton = document.getElementById("send");
      const textInput = document.getElementById("text");
      const clientIdInput = document.getElementById("clientId");

      clientIdInput.value = `browser-${Math.random().toString(16).slice(2, 8)}`;

      let realtime;
      let channel;

      function setStatus(text) {
        statusNode.textContent = text;
      }

      function renderMessage(message, fromHistory = false) {
        const data = message.data ?? {};
        if (!data.id || document.querySelector(`[data-message-id="${CSS.escape(data.id)}"]`)) {
          return;
        }
        const wrapper = document.createElement("article");
        wrapper.className = `message ${data.clientId === clientIdInput.value ? "self" : ""}`;
        wrapper.dataset.messageId = data.id;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `${data.author ?? message.clientId ?? "client"}${
          fromHistory ? " · history" : ""
        }`;

        const body = document.createElement("div");
        body.textContent = data.text ?? "";

        wrapper.append(meta, body);
        messagesNode.append(wrapper);
        messagesNode.scrollTop = messagesNode.scrollHeight;
      }

      settings.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (realtime) {
          realtime.close();
        }

        const key = document.getElementById("key").value;
        const endpoint = document.getElementById("endpoint").value;
        const port = Number(document.getElementById("port").value);
        const channelName = document.getElementById("channel").value;
        const clientId = clientIdInput.value;

        setStatus("Connecting...");
        realtime = new Ably.Realtime({
          key,
          clientId,
          endpoint,
          port,
          tls: false,
          useBinaryProtocol: false,
          autoConnect: false,
        });

        realtime.connection.on((change) => {
          setStatus(`Connection: ${change.current}`);
        });
        realtime.connect();

        channel = realtime.channels.get(channelName);
        channel.subscribe("chat-message", (message) => renderMessage(message));
        await channel.attach();
        sendButton.disabled = false;

        try {
          const history = await channel.history({ limit: 25 });
          for (const message of [...(history.items ?? [])].reverse()) {
            renderMessage(message, true);
          }
        } catch (error) {
          console.warn("History is unavailable from this browser origin", error);
        }

        setStatus(`Attached to ${channelName}`);
      });

      composer.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = textInput.value.trim();
        if (!text || !channel) {
          return;
        }
        const payload = {
          id: `${clientIdInput.value}-${Date.now()}`,
          author: clientIdInput.value,
          clientId: clientIdInput.value,
          text,
          ts: Date.now(),
        };
        textInput.value = "";
        await channel.publish("chat-message", payload);
      });
    </script>
  </body>
</html>
