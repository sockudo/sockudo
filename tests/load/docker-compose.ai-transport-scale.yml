      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai-loadgen:
    image: node:22-alpine
    working_dir: /repo
    volumes:
      - .:/repo:ro
    environment:
      SOCKUDO_NODE_URLS: "http://sockudo-node-1:6001,http://sockudo-node-2:6001,http://sockudo-node-3:6001,http://sockudo-node-4:6001,http://sockudo-node-5:6001"
      SOCKUDO_APP_ID: "app-id"
      SOCKUDO_APP_KEY: "app-key"
      SOCKUDO_APP_SECRET: "app-secret"
    command: ["node", "tests/load/ai-scale-runner.mjs", "--profile", "tests/load/profiles/smoke.json", "--output", "/tmp/ai-scale-result.json"]
    depends_on:
      sockudo-node-1:
        condition: service_healthy
      sockudo-node-2:
        condition: service_healthy
      sockudo-node-3:
        condition: service_healthy
      sockudo-node-4:
        condition: service_healthy
      sockudo-node-5:
        condition: service_healthy
    networks:
      - sockudo-ai-network
