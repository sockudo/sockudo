    environment:
      RUST_LOG: "info"
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "6001"
      METRICS_PORT: "9601"
      ADAPTER_DRIVER: "redis"
      CACHE_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      APP_MANAGER_DRIVER: "memory"
      HISTORY_ENABLED: "true"
      HISTORY_BACKEND: "postgres"
      VERSIONED_MESSAGES_ENABLED: "true"
      VERSIONED_MESSAGES_DRIVER: "postgres"
      AI_TRANSPORT_ENABLED: "true"
      AI_TRANSPORT_ROLLUP_ORPHAN_TTL_MS: "60000"
      DATABASE_REDIS_HOST: "redis"
      DATABASE_REDIS_PORT: "6379"
      DATABASE_REDIS_DB: "0"
      DATABASE_REDIS_KEY_PREFIX: "sockudo-ai:"
      DATABASE_POSTGRES_HOST: "postgres"
      DATABASE_POSTGRES_PORT: "5432"
      DATABASE_POSTGRES_USERNAME: "postgres"
      DATABASE_POSTGRES_PASSWORD: "postgres123"
      DATABASE_POSTGRES_DATABASE: "sockudo_ai"
      DATABASE_POSTGRES_POOL_MIN: "2"
      DATABASE_POSTGRES_POOL_MAX: "16"
      SOCKUDO_DEFAULT_APP_ID: "app-id"
      SOCKUDO_DEFAULT_APP_KEY: "app-key"
      SOCKUDO_DEFAULT_APP_SECRET: "app-secret"
      SOCKUDO_DEFAULT_APP_ENABLED: "true"
